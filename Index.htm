<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Snake</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
        }
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .stats {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="stats">Snakes Collected: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Use <b>Arrow Keys</b> to move the Food. Don't let the Snake starve!</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Player (The Food)
        let player = { x: 10, y: 10 };
        
        // The Enemy (The Snake)
        let snake = [
            { x: 5, y: 5 },
            { x: 4, y: 5 },
            { x: 3, y: 5 }
        ];
        let dx = 1;
        let dy = 0;
        
        let score = 0;
        let gameSpeed = 150;

        function main() {
            if (didGameEnd()) {
                alert("The snake escaped! Game Over.");
                resetGame();
            }

            setTimeout(function onTick() {
                clearCanvas();
                advanceSnake();
                drawSnake();
                drawPlayer();
                checkCatch();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawPlayer() {
            ctx.fillStyle = "#ff3e3e"; // Red food color
            ctx.shadowBlur = 10;
            ctx.shadowColor = "red";
            ctx.fillRect(player.x * gridSize, player.y * gridSize, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
        }

        function drawSnake() {
            ctx.fillStyle = "#4ade80"; // Classic snake green
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            // Simple AI: Move toward the player
            const head = { x: snake[0].x, y: snake[0].y };

            if (head.x < player.x) { dx = 1; dy = 0; }
            else if (head.x > player.x) { dx = -1; dy = 0; }
            else if (head.y < player.y) { dx = 0; dy = 1; }
            else if (head.y > player.y) { dx = 0; dy = -1; }

            const newHead = { x: head.x + dx, y: head.y + dy };
            snake.unshift(newHead);
            snake.pop();
        }

        function checkCatch() {
            // In reverse snake, if the head touches you, you "caught" the snake
            if (snake[0].x === player.x && snake[0].y === player.y) {
                score++;
                scoreElement.innerHTML = score;
                
                // Make the snake longer as a "penalty/difficulty" increase
                snake.push({ ...snake[snake.length - 1] });
                
                // Relocate player
                player.x = Math.floor(Math.random() * tileCount);
                player.y = Math.floor(Math.random() * tileCount);
                
                // Speed up slightly
                if (gameSpeed > 50) gameSpeed -= 5;
            }
        }

        function didGameEnd() {
            const head = snake[0];
            // Snake hits walls
            const hitLeftWall = head.x < 0;
            const hitRightWall = head.x > tileCount - 1;
            const hitTopWall = head.y < 0;
            const hitBottomWall = head.y > tileCount - 1;
            
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function resetGame() {
            player = { x: 10, y: 10 };
            snake = [{ x: 5, y: 5 }, { x: 4, y: 5 }, { x: 3, y: 5 }];
            score = 0;
            gameSpeed = 150;
            scoreElement.innerHTML = score;
            dx = 1;
            dy = 0;
        }

        // Controls for the Food
        window.addEventListener("keydown", event => {
            switch (event.key) {
                case "ArrowUp":    if (player.y > 0) player.y--; break;
                case "ArrowDown":  if (player.y < tileCount - 1) player.y++; break;
                case "ArrowLeft":  if (player.x > 0) player.x--; break;
                case "ArrowRight": if (player.x < tileCount - 1) player.x++; break;
            }
        });

        main();
    </script>
</body>
</html>
